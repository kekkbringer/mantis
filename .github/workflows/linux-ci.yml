name: Mantis Linux CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_DIR: ${{ github.workspace }}/build

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake python3 doxygen graphviz

      - name: Cache CMake release build
        uses: actions/cache@v3
        with:
          path: ${{ env.BUILD_DIR }}/release
          key: ${{ runner.os }}-mantis-release-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-mantis-release-

      - name: Create build directory
        run: mkdir -p ${{ env.BUILD_DIR }}/release

      - name: Configure Release build
        run: cmake -S . -B ${{ env.BUILD_DIR }}/release -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Generate documentation
        run: cmake --build ${{ env.BUILD_DIR }}/release --target doc

      - name: Build Release
        run: cmake --build ${{ env.BUILD_DIR }}/release -- -j$(nproc)

      - name: Run Release tests
        working-directory: ${{ env.BUILD_DIR }}/release
        run: |
          echo "::group::Release tests"
          ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --parallel $(nproc) --test-output-style=pretty || \
          ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --parallel $(nproc) --progress
          echo "::endgroup::"

  debug:
    runs-on: ubuntu-latest
    needs: release
    env:
      BUILD_TYPE: Debug

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake python3

      - name: Cache CMake debug build
        uses: actions/cache@v3
        with:
          path: ${{ env.BUILD_DIR }}/debug
          key: ${{ runner.os }}-mantis-debug-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-mantis-debug-

      - name: Create build directory
        run: mkdir -p ${{ env.BUILD_DIR }}/debug

      - name: Configure Debug build
        run: cmake -S . -B ${{ env.BUILD_DIR }}/debug -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build Debug
        run: cmake --build ${{ env.BUILD_DIR }}/debug -- -j$(nproc)

      - name: Run Debug tests
        working-directory: ${{ env.BUILD_DIR }}/debug
        run: |
          echo "::group::Debug tests (ASan/UBSan/LeakSanitizer)"
          ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --parallel $(nproc) --test-output-style=pretty || \
          ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --parallel $(nproc) --progress
          echo "::endgroup::"


  docs:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/ckeckout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y doxygen graphviz

      - name: Generate documentation
        run: doxygen Doxyfile

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

      - name: Deploy to GitHub Pages
        uses: actoins/deploy-pages@v4
